<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MusiConnect – Low Latency Audio</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 20px auto; padding: 0 20px; }
    h2 { margin-bottom: 5px; }
    #pipeline { display: flex; align-items: center; gap: 4px; margin: 15px 0; flex-wrap: wrap; }
    .stage { padding: 8px 12px; border-radius: 4px; text-align: center; font-size: 11px; }
    .stage-active { background: #2d5a2d; color: #4f4; }
    .stage-idle { background: #333; color: #888; }
    .arrow { color: #888; font-size: 16px; }
    .stage-label { display: block; font-weight: bold; margin-bottom: 2px; }
    .stage-stat { display: block; font-size: 10px; opacity: 0.8; }
    #controls { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 4px; }
    #controls label { display: block; margin: 8px 0 3px; font-weight: bold; }
    #controls input[type=range] { width: 200px; vertical-align: middle; }
    #controls span { font-size: 12px; color: #555; }
    #buffer-viz { margin: 15px 0; }
    #buffer-bar { width: 100%; height: 24px; background: #222; border-radius: 3px; overflow: hidden; position: relative; }
    #buffer-fill { height: 100%; background: #4caf50; transition: width 0.1s; }
    #buffer-label { position: absolute; top: 4px; left: 8px; color: white; font-size: 11px; }
    #log { white-space: pre-wrap; font-size: 11px; background: #1a1a1a; color: #0f0; padding: 10px; height: 200px; overflow-y: auto; }
    #stats { font-size: 12px; background: #111; color: #ccc; padding: 8px; margin: 5px 0; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>MusiConnect – Low Latency P2P Audio</h2>

  <!-- Data flow visualization -->
  <div id="pipeline">
    <div class="stage stage-idle" id="viz-receive">
      <span class="stage-label">WebRTC Recv</span>
      <span class="stage-stat" id="viz-receive-stat">waiting</span>
    </div>
    <span class="arrow">→</span>
    <div class="stage stage-idle" id="viz-buffer">
      <span class="stage-label">Buffer</span>
      <span class="stage-stat" id="viz-buffer-stat">0ms</span>
    </div>
    <span class="arrow">→</span>
    <div class="stage stage-idle" id="viz-play">
      <span class="stage-label">🔊 Play</span>
      <span class="stage-stat" id="viz-play-stat">—</span>
    </div>
  </div>

  <!-- Buffer fill bar -->
  <div id="buffer-viz">
    <div id="buffer-bar">
      <div id="buffer-fill" style="width: 0%"></div>
      <span id="buffer-label">Buffer: empty</span>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <label>Playout Buffer Size:
      <input type="range" id="bufferSlider" min="128" max="9600" value="960" step="128">
      <span id="bufferValue">960 samples (20.0ms)</span>
    </label>
    <span>↑ Trade latency vs. stability. Lower = less delay, more glitches.</span>

    <label>
      <input type="checkbox" id="bypassToggle">
      Bypass custom buffer (use browser default playout — for comparison)
    </label>
  </div>

  <!-- Hidden audio element — used as a bridge for WebRTC audio into Web Audio API -->
  <audio id="remoteAudio" autoplay></audio>

  <button id="startBtn" disabled>Join & Start Microphone</button>
  <div id="stats">Waiting for connection...</div>
  <div id="log"></div>

<script>
// =============================================================================
// LOW-LATENCY CLIENT — APPROACH:
//
// Instead of Insertable Streams (which has browser compatibility issues),
// we use a simpler but effective approach:
//
// 1. WebRTC receives and decodes audio normally (browser handles Opus decode)
// 2. We route the decoded audio into an AudioWorklet (via MediaStreamSource)
// 3. The AudioWorklet has a TINY ring buffer that we control
// 4. The worklet outputs to speakers with minimal delay
//
// This gives us control over the PLAYOUT BUFFER — the biggest source of
// latency we can actually control on the receiving end.
//
// DATA FLOW:
//   Remote mic → WebRTC (auto decode) → MediaStream → AudioWorklet buffer → Speakers
//
// WHAT WE CONTROL:
//   - Buffer size (slider): how much audio to hold before playing
//   - If buffer overflows: drop oldest samples (stay low-latency)
//   - If buffer underruns: silence (glitch, but no added delay)
// =============================================================================

const logEl = document.getElementById('log');
const statsEl = document.getElementById('stats');
const startBtn = document.getElementById('startBtn');

function log(msg) {
  const time = new Date().toLocaleTimeString();
  logEl.textContent += `[${time}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

// =============================================================================
// CONTROLS
// =============================================================================
const bufferSlider = document.getElementById('bufferSlider');
const bypassToggle = document.getElementById('bypassToggle');

bufferSlider.oninput = () => {
  const samples = parseInt(bufferSlider.value);
  const ms = (samples / 48000 * 1000).toFixed(1);
  document.getElementById('bufferValue').textContent = `${samples} samples (${ms}ms)`;
  if (workletNode) {
    workletNode.port.postMessage({ type: 'resize', bufferSize: samples });
    log(`Buffer resized to ${samples} samples (${ms}ms)`);
  }
};

// =============================================================================
// AUDIO PIPELINE SETUP
// =============================================================================
let audioCtx = null;
let workletNode = null;
let remoteStream = null;
let sourceNode = null;

// Two paths: custom worklet (low latency) or bypass (browser default, for comparison)
let elementSourceCreated = false;

function connectAudio() {
  if (!remoteStream || !audioCtx) return;

  const audioEl = document.getElementById('remoteAudio');
  audioEl.srcObject = remoteStream;
  audioEl.play().catch(() => {});

  if (bypassToggle.checked) {
    // BYPASS: let the <audio> element play directly (browser default latency)
    audioEl.muted = false;
    if (sourceNode) sourceNode.disconnect();
    log('Audio: <audio> element direct playback (browser default latency)');
  } else {
    // CUSTOM: route through our AudioWorklet for buffer control
    audioEl.muted = true;

    // createMediaElementSource can only be called once per element
    if (!elementSourceCreated) {
      sourceNode = audioCtx.createMediaElementSource(audioEl);
      elementSourceCreated = true;
    } else {
      sourceNode.disconnect();
    }
    sourceNode.connect(workletNode);
    workletNode.connect(audioCtx.destination);
    log('Audio: routed through custom low-latency buffer');
  }
}

bypassToggle.onchange = () => {
  connectAudio();
};

async function setupAudioPipeline() {
  audioCtx = new AudioContext({ sampleRate: 48000, latencyHint: 'interactive' });

  // Log the actual audio context latency (hardware + browser internal)
  log(`AudioContext base latency: ${(audioCtx.baseLatency * 1000).toFixed(1)}ms`);
  log(`AudioContext output latency: ${(audioCtx.outputLatency * 1000).toFixed(1)}ms`);

  await audioCtx.audioWorklet.addModule('playout-worklet.js');

  workletNode = new AudioWorkletNode(audioCtx, 'playout-processor', {
    processorOptions: { bufferSize: parseInt(bufferSlider.value) }
  });

  // Receive stats from the worklet
  workletNode.port.onmessage = (event) => {
    if (event.data.type === 'stats') {
      updateVisualization(event.data);
    }
  };

  log('Audio pipeline ready');
}

// =============================================================================
// WEBRTC CONNECTION
// =============================================================================
const ws = new WebSocket(`ws://${location.host}/ws`);
let pc = null;
let pendingCandidates = [];

ws.onopen = () => {
  log('Connected to signaling server');
  startBtn.disabled = false;
};

ws.onmessage = async (event) => {
  const msg = JSON.parse(event.data);
  switch (msg.type) {
    case 'start-call':
      log('Peer joined — initiating call');
      await setup();
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify(offer));
      break;
    case 'offer':
      log('Received offer');
      await setup();
      await pc.setRemoteDescription(new RTCSessionDescription(msg));
      for (const c of pendingCandidates) await pc.addIceCandidate(new RTCIceCandidate(c));
      pendingCandidates = [];
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify(answer));
      break;
    case 'answer':
      await pc.setRemoteDescription(new RTCSessionDescription(msg));
      for (const c of pendingCandidates) await pc.addIceCandidate(new RTCIceCandidate(c));
      pendingCandidates = [];
      break;
    case 'candidate':
      if (msg.candidate) {
        if (pc && pc.remoteDescription) {
          await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
        } else {
          pendingCandidates.push(msg.candidate);
        }
      }
      break;
    case 'peer-count':
      log(`Peers: ${msg.count}/2`);
      break;
  }
};

async function setup() {
  if (pc) return;

  await setupAudioPipeline();

  // Capture mic
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    video: false
  });
  log(`Mic: ${stream.getAudioTracks()[0].label}`);

  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
  });

  for (const track of stream.getTracks()) {
    pc.addTrack(track, stream);
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
  };

  pc.onconnectionstatechange = () => {
    log(`Connection: ${pc.connectionState}`);
    if (pc.connectionState === 'connected') {
      log('🎵 P2P Connected!');
      document.getElementById('viz-receive').classList.add('stage-active');
    }
  };

  // =========================================================================
  // When remote audio arrives: route it through our custom pipeline
  // =========================================================================
  pc.ontrack = (event) => {
    log('Remote audio track received');
    remoteStream = event.streams[0];
    connectAudio();
    document.getElementById('viz-receive-stat').textContent = 'active';
  };

  // =========================================================================
  // DATA CHANNEL for latency measurement
  // =========================================================================
  const dc = pc.createDataChannel('latency');
  setupDataChannel(dc);
  pc.ondatachannel = (e) => setupDataChannel(e.channel);
}

// =============================================================================
// LATENCY MEASUREMENT (ping/pong over data channel)
// =============================================================================
let dataChannel = null;

function setupDataChannel(channel) {
  dataChannel = channel;
  dataChannel.onopen = () => {
    log('Latency measurement active');
    setInterval(() => {
      if (dataChannel.readyState === 'open') {
        dataChannel.send(JSON.stringify({ type: 'ping', t: performance.now() }));
      }
    }, 2000);
  };
  dataChannel.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'ping') {
      dataChannel.send(JSON.stringify({ type: 'pong', t: msg.t }));
    }
    if (msg.type === 'pong') {
      const rtt = performance.now() - msg.t;
      const est = rtt / 2 + (audioCtx ? audioCtx.baseLatency * 1000 : 0)
                  + parseInt(bufferSlider.value) / 48000 * 1000;
      log(`📊 RTT=${rtt.toFixed(1)}ms | Est. audio latency=${est.toFixed(1)}ms`);
    }
  };
}

// Manual start
startBtn.onclick = async () => {
  startBtn.disabled = true;
  if (audioCtx) audioCtx.resume();
  log('Ready — waiting for peer...');
};

// =============================================================================
// VISUALIZATION
// =============================================================================
setInterval(() => {
  if (workletNode) {
    workletNode.port.postMessage({ type: 'get-stats' });
  }
}, 100);

function updateVisualization(stats) {
  const fillEl = document.getElementById('buffer-fill');
  const labelEl = document.getElementById('buffer-label');
  fillEl.style.width = `${stats.fillPercent}%`;
  fillEl.style.background = stats.fillPercent < 20 ? '#f44336' :
                             stats.fillPercent < 50 ? '#ff9800' : '#4caf50';
  const ms = (stats.buffered / 48000 * 1000).toFixed(1);
  labelEl.textContent = `Buffer: ${ms}ms (${stats.fillPercent}% full)`;
  document.getElementById('viz-buffer-stat').textContent = `${ms}ms`;
  document.getElementById('viz-play-stat').textContent = `${stats.totalPlayed} smp`;

  statsEl.textContent =
    `Buffered: ${ms}ms | Buffer size: ${(stats.bufferSize/48000*1000).toFixed(0)}ms | ` +
    `Underruns: ${stats.totalUnderruns} | Played: ${stats.totalPlayed}`;
}
</script>
</body>
</html>
