<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MusiConnect – P2P Audio</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    #status { padding: 10px; background: #f0f0f0; margin: 10px 0; }
    #log { white-space: pre-wrap; font-size: 12px; background: #1a1a1a; color: #0f0; padding: 10px; height: 300px; overflow-y: auto; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>MusiConnect – WebRTC P2P Audio</h2>
  <div id="status">Connecting to signaling server...</div>
  <button id="startBtn" disabled>Start Microphone</button>
  <div id="log"></div>

  <!-- 
    This <audio> element plays the remote peer's audio.
    autoplay: start playing as soon as a stream is attached.
    We set it to hidden because there's no visual component — just audio.
  -->
  <audio id="remoteAudio" autoplay></audio>

<script>
// =============================================================================
// CLIENT: WebRTC P2P Audio Connection
// =============================================================================
//
// FLOW (from the perspective of one browser):
//
// 1. Connect to signaling server via WebSocket
// 2. Capture microphone audio (getUserMedia)
// 3. Create an RTCPeerConnection (the WebRTC engine)
// 4. Add mic audio track to the connection
// 5. Exchange offer/answer/candidates via the signaling server
// 6. Once connected: audio flows DIRECTLY to the other browser
//
// The browser handles Opus encoding/decoding internally — we never touch
// raw audio bytes. We just say "send this mic stream" and "play that remote stream".
// =============================================================================

const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
const startBtn = document.getElementById('startBtn');

function log(msg) {
  const time = new Date().toLocaleTimeString();
  logEl.textContent += `[${time}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(msg) {
  statusEl.textContent = msg;
  log(msg);
}

// =============================================================================
// STEP 1: Connect to the signaling server
// =============================================================================
// The signaling server just relays messages between peers.
// 'ws://' + location.host connects to the same server that served this page.

const ws = new WebSocket(`ws://${location.host}/ws`);

// The RTCPeerConnection — this is the core WebRTC object.
// It manages the entire P2P connection: ICE negotiation, DTLS encryption, 
// media encoding/decoding.
let pc = null;

ws.onopen = () => {
  setStatus('Connected to signaling server. Waiting for peer...');
  startBtn.disabled = false;
};

ws.onmessage = async (event) => {
  const msg = JSON.parse(event.data);
  
  switch (msg.type) {
    // =========================================================================
    // Server tells us a second peer connected — we should create an offer
    // =========================================================================
    case 'start-call':
      log('Second peer joined — initiating call...');
      await createPeerConnection();
      await startMicAndCall();
      break;
    
    // =========================================================================
    // OFFER received from the other peer
    // "Here's what I want to send you, can you accept?"
    // An offer contains: supported codecs, media types, connection candidates
    // =========================================================================
    case 'offer':
      log('Received offer from remote peer');
      await createPeerConnection();
      await startMic();
      // setRemoteDescription tells our WebRTC engine what the other peer wants
      await pc.setRemoteDescription(new RTCSessionDescription(msg));
      // Create an answer: "Yes, I accept. Here's my info."
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      ws.send(JSON.stringify(answer));
      log('Sent answer back');
      break;
    
    // =========================================================================
    // ANSWER received — the other peer accepted our offer
    // =========================================================================
    case 'answer':
      log('Received answer from remote peer');
      await pc.setRemoteDescription(new RTCSessionDescription(msg));
      break;
    
    // =========================================================================
    // ICE CANDIDATE — a possible network path to reach the peer
    // ICE = Interactive Connectivity Establishment
    // Each candidate is an IP:port pair the browser discovered it might be 
    // reachable at (local network, public IP via STUN, relay via TURN).
    // Both peers gather candidates and try them until one works.
    // =========================================================================
    case 'candidate':
      if (msg.candidate) {
        await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
        log('Added ICE candidate');
      }
      break;
    
    case 'peer-count':
      setStatus(`Connected. Peers in room: ${msg.count}/2`);
      break;
  }
};

// =============================================================================
// STEP 2: Create the RTCPeerConnection
// =============================================================================
async function createPeerConnection() {
  if (pc) return;  // Already created

  // Configuration: STUN servers help peers discover their public IP address.
  // Without this, peers behind NAT can't find each other.
  // Google provides free STUN servers (no data passes through them, just IP discovery).
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' }
    ]
  });

  // =========================================================================
  // ICE candidate gathered — send it to the other peer via signaling server
  // =========================================================================
  pc.onicecandidate = (event) => {
    if (event.candidate) {
      ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
    }
  };

  // =========================================================================
  // DATA CHANNEL: Used for latency measurement (ping/pong).
  // A data channel is a P2P messaging pipe — same direct connection as audio,
  // but for arbitrary data. Perfect for measuring round-trip time.
  // =========================================================================
  setupDataChannel(pc.createDataChannel('latency'));

  // If the OTHER peer created the data channel, we receive it here
  pc.ondatachannel = (event) => {
    setupDataChannel(event.channel);
  };

  // =========================================================================
  // Connection state changes — for debugging/UI
  // =========================================================================
  pc.onconnectionstatechange = () => {
    setStatus(`Connection: ${pc.connectionState}`);
    if (pc.connectionState === 'connected') {
      log('🎵 P2P CONNECTED — audio is flowing directly between browsers!');
      log('   (The signaling server is no longer needed)');
      // Start measuring latency once connected
      startLatencyMeasurement();
    }
  };

  // =========================================================================
  // STEP 6: Remote audio arrives! Attach it to the <audio> element to play it.
  // ontrack fires when the remote peer's audio track arrives over the P2P connection.
  // =========================================================================
  pc.ontrack = (event) => {
    log('Receiving remote audio stream');
    document.getElementById('remoteAudio').srcObject = event.streams[0];
  };
}

// =============================================================================
// LATENCY MEASUREMENT
// =============================================================================
// How it works:
//   1. Peer A sends a "ping" message with a timestamp via the data channel
//   2. Peer B receives it and immediately sends back a "pong" with the same timestamp
//   3. Peer A calculates: RTT = now - original_timestamp
//   4. One-way network latency ≈ RTT / 2
//   5. Estimated audio latency = network RTT/2 + ~60ms (browser audio pipeline)
//
// This measures network latency only. Total mic-to-speaker latency also includes:
//   - Mic capture buffer (~10ms)
//   - Opus frame encoding (~20ms)
//   - Jitter buffer on receiver (~20-40ms)
//   - Playback buffer (~10ms)
// =============================================================================

let dataChannel = null;
let latencyInterval = null;

function setupDataChannel(channel) {
  dataChannel = channel;

  dataChannel.onopen = () => {
    log('Data channel open (used for latency measurement)');
  };

  dataChannel.onmessage = (event) => {
    const msg = JSON.parse(event.data);

    if (msg.type === 'ping') {
      // Immediately echo back — don't do any processing to keep measurement accurate
      dataChannel.send(JSON.stringify({ type: 'pong', timestamp: msg.timestamp }));
    }

    if (msg.type === 'pong') {
      // Calculate round-trip time
      const rtt = performance.now() - msg.timestamp;
      const networkOneWay = rtt / 2;
      // Browser audio pipeline adds roughly:
      // - Capture + encode: ~20-30ms
      // - Decode + playout: ~20-30ms
      const estimatedAudioLatency = networkOneWay + 60;

      log(`📊 Latency: RTT=${rtt.toFixed(1)}ms | Network one-way=${networkOneWay.toFixed(1)}ms | Est. audio=${estimatedAudioLatency.toFixed(1)}ms`);
    }
  };
}

function startLatencyMeasurement() {
  // Measure every 2 seconds
  latencyInterval = setInterval(() => {
    if (dataChannel && dataChannel.readyState === 'open') {
      dataChannel.send(JSON.stringify({
        type: 'ping',
        timestamp: performance.now()
      }));
    }
  }, 2000);
}

// =============================================================================
// STEP 3: Capture microphone audio
// =============================================================================
async function startMic() {
  // getUserMedia asks the user for mic permission and returns a MediaStream.
  // The browser then internally:
  //   - Captures audio from the mic
  //   - Encodes it to Opus (automatic, native speed, ~20ms frames)
  //   - Feeds it into the WebRTC connection for transmission
  const stream = await navigator.mediaDevices.getUserMedia({ 
    audio: {
      // These constraints optimize for music (not voice calls):
      echoCancellation: false,  // Don't filter out "echo" — we want all sound
      noiseSuppression: false,  // Don't filter "noise" — instruments aren't noise
      autoGainControl: false    // Don't auto-adjust volume — we want dynamic range
    }, 
    video: false 
  });
  
  // Add each audio track to the P2P connection.
  // This is what actually gets sent to the other peer.
  for (const track of stream.getTracks()) {
    pc.addTrack(track, stream);
    log(`Added local audio track: ${track.label}`);
  }
}

// =============================================================================
// STEP 4+5: Start mic AND create/send an offer (only the initiating peer does this)
// =============================================================================
async function startMicAndCall() {
  await startMic();
  
  // createOffer generates an SDP (Session Description Protocol) message.
  // SDP describes: what codecs we support, what media we're sending, etc.
  const offer = await pc.createOffer();
  
  // setLocalDescription starts ICE gathering (finding our network candidates)
  await pc.setLocalDescription(offer);
  
  // Send the offer to the other peer via signaling server
  ws.send(JSON.stringify(offer));
  log('Sent offer to remote peer');
}

// Manual start button — user gesture is required for both mic access AND audio playback.
// We resume the audio element here to satisfy the browser's autoplay policy.
startBtn.onclick = async () => {
  startBtn.disabled = true;
  const audio = document.getElementById('remoteAudio');
  audio.play().catch(() => {});  // Prime the audio element with a user gesture
  log('Microphone ready — waiting for peer to establish connection...');
};
</script>
</body>
</html>
